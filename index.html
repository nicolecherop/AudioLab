
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Audio Player</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .player {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
    }
    h2 {
        margin-bottom: 20px;
        color: #333;
    }
    button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        margin: 5px;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background-color: #0056b3;
    }
    input[type="range"] {
        width: 100%;
        margin-top: 10px;
    }
    .time {
        margin-top: 15px;
        font-weight: bold;
        color: #555;
    }
    .note {
        margin-top: 10px;
        font-size: 12px;
        color: gray;
    }
</style>
</head>
<body>

<div class="player">
    <h2>Audio Player</h2>
    <input type="file" id="fileInput" accept="audio/*">
    <br><br>

    <audio id="audio"></audio>

    <button id="playBtn">Play</button>
    <button id="pauseBtn">Pause</button>

    <br>
    <!-- Additional Feature -->
    <button id="muteBtn">Mute / Unmute</button>

    <br><br>

    <label><strong>Volume</strong></label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <div class="time">
        Time: <span id="time">0</span> sec
    </div>

    <div class="note">
        Space = Play/Pause | M = Mute
    </div>
</div>

<script>
    const audio = document.getElementById("audio");
    const fileInput = document.getElementById("fileInput");
    const volume = document.getElementById("volume");
    const timeDisplay = document.getElementById("time");

    fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            audio.src = URL.createObjectURL(file);
        }
    });

    document.getElementById("playBtn").addEventListener("click", () => {
        audio.play();
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
        audio.pause();
    });

    volume.addEventListener("input", () => {
        audio.volume = volume.value;
    });

    document.getElementById("muteBtn").addEventListener("click", () => {
        audio.muted = !audio.muted;
    });

    audio.addEventListener("timeupdate", () => {
        timeDisplay.textContent = Math.floor(audio.currentTime);
    });

    // Keyboard controls for the mute and space
    document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            e.preventDefault();

            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        if (e.key.toLowerCase() === "m") {
            audio.muted = !audio.muted;
        }
    });
</script>

</body>
</html>
